<!DOCTYPE html>
<html>
<head>
  <title>Opit Cycle Time</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 40px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .logo {
      font-weight: bold;
      color: #38bdf8;
      font-size: 18px;
      letter-spacing: 2px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    h2 {
      margin-top: 40px;
      margin-bottom: 20px;
    }

    .pricing {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 25px;
      width: 220px;
      transition: 0.3s;
      border: 1px solid #334155;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: #38bdf8;
    }

    .price {
      font-size: 22px;
      margin: 10px 0;
      color: #38bdf8;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #38bdf8;
      color: black;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
    }

    footer {
      margin-top: 60px;
      padding: 20px;
      font-size: 14px;
      color: #94a3b8;
    }

    footer a {
      color: #38bdf8;
      margin: 0 10px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">OPIT</div>
  <h1>Opit Cycle Time</h1>
  <p class="subtitle">Improve workflows and efficiency with smart cycle tracking.</p>
</header>

<h2>Pricing</h2>

<div class="pricing">

  <div class="card">
    <h3>Monthly</h3>
    <p class="price">$10</p>
    <p>/ month</p>
    <div class="btn">Subscribe</div>
  </div>

  <div class="card">
    <h3>Quarterly</h3>
    <p class="price">$25</p>
    <p>/ 3 months</p>
    <div class="btn">Subscribe</div>
  </div>

  <div class="card">
    <h3>6 Months</h3>
    <p class="price">$45</p>
    <p>/ 6 months</p>
    <div class="btn">Subscribe</div>
  </div>

  <div class="card">
    <h3>Yearly</h3>
    <p class="price">$80</p>
    <p>/ year</p>
    <div class="btn">Subscribe</div>
  </div>

</div>

<footer>
  <a href="terms.html">Terms</a>
  <a href="privacy.html">Privacy</a>
  <a href="refund.html">Refund</a>
</footer>

</body>
</html>
